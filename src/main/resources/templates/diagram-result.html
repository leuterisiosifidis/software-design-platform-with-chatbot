<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RESPEQ — Diagram Result</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='11' fill='%231E3A8A'/><polyline points='17,13 9,24 17,35' stroke='white' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><polyline points='31,13 39,24 31,35' stroke='white' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><rect x='21' y='20' width='6' height='8' rx='2' fill='white'/></svg>"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f4f8; font-family: 'DM Sans', sans-serif; }
        .card { border: none; box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
        #diagramOutput img { max-width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; }
        #nomnomlCanvas { max-width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; }
        #scriptArea { font-family: monospace; font-size: 0.85rem; background: #f8f9fa; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <div class="d-flex align-items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="28" height="28">
            <defs><linearGradient id="ng" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#1E3A8A"/><stop offset="100%" stop-color="#38BDF8"/></linearGradient></defs>
            <rect width="48" height="48" rx="11" fill="url(#ng)"/>
            <polyline points="17,13 9,24 17,35" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="31,13 39,24 31,35" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="21" y="20" width="6" height="8" rx="2" fill="white"/>
        </svg>
        <span style="font-family:'Syne',sans-serif;font-weight:800;letter-spacing:0.08em;font-size:1.15rem;" class="text-white">RESPEQ</span>
    </div>
    <div class="d-flex gap-3 align-items-center">
        <a href="/projects" class="text-white text-decoration-none">My Projects</a>
        <a href="/dashboard" class="text-white text-decoration-none">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <h4 class="fw-bold mb-1"
        th:text="${diagramType + ' Diagram'}"></h4>
    <p class="text-muted mb-4"
       th:text="'Format: ' + ${format}"></p>

    <div class="row g-4">

        <!-- Script Panel -->
        <div class="col-md-5">
            <div class="card p-4 h-100">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="fw-bold mb-0">Generated Script</h6>
                    <button class="btn btn-sm btn-outline-secondary"
                            onclick="copyScript()">Copy</button>
                </div>
                <textarea id="scriptArea" class="form-control flex-grow-1"
                          rows="20" readonly th:text="${script}"></textarea>
                <div id="copyMsg" class="text-success small mt-1"
                     style="display:none;">Copied!</div>
            </div>
        </div>

        <!-- Diagram Render Panel -->
        <div class="col-md-7">
            <div class="card p-4 h-100">
                <h6 class="fw-bold mb-3">Diagram Preview</h6>
                <div id="diagramOutput">
                    <canvas id="nomnomlCanvas"
                            style="display:none; width:100%;"></canvas>
                    <div id="plantumlOutput"></div>
                    <div id="renderError" class="alert alert-warning"
                         style="display:none;">Could not render diagram.</div>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-4 d-flex gap-3">
        <a th:href="@{/projects/{id}/diagrams(id=${projectId})}"
           class="btn btn-outline-primary">Generate Another</a>
        <a th:href="@{/projects}"
           class="btn btn-outline-secondary">Back to Projects</a>
    </div>
</div>

<!-- Thymeleaf injects the script and format into JS variables -->
<script th:inline="javascript">
    const scriptContent = [[${script}]];
    const format = [[${format}]];
</script>

<!-- pako for PlantUML deflate encoding -->
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<!-- nomnoml for Nomnoml rendering -->
<script src="https://cdn.jsdelivr.net/npm/nomnoml@1.6.2/dist/nomnoml.min.js"></script>

<script>
    function copyScript() {
        const area = document.getElementById("scriptArea");
        navigator.clipboard.writeText(area.value).then(() => {
            const msg = document.getElementById("copyMsg");
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 2000);
        });
    }

    // PlantUML custom base64 encoding
    function encode6bit(b) {
        if (b < 10) return String.fromCharCode(48 + b);
        b -= 10;
        if (b < 26) return String.fromCharCode(65 + b);
        b -= 26;
        if (b < 26) return String.fromCharCode(97 + b);
        b -= 26;
        if (b === 0) return '-';
        if (b === 1) return '_';
        return '?';
    }

    function append3bytes(b1, b2, b3) {
        const c1 = b1 >> 2;
        const c2 = ((b1 & 0x3) << 4) | (b2 >> 4);
        const c3 = ((b2 & 0xf) << 2) | (b3 >> 6);
        const c4 = b3 & 0x3f;
        return encode6bit(c1) + encode6bit(c2) + encode6bit(c3) + encode6bit(c4);
    }

    function encodePlantUML(source) {
        const utf8 = new TextEncoder().encode(source);
        const compressed = pako.deflateRaw(utf8);
        let result = "";
        for (let i = 0; i < compressed.length; i += 3) {
            const b1 = compressed[i];
            const b2 = i + 1 < compressed.length ? compressed[i + 1] : 0;
            const b3 = i + 2 < compressed.length ? compressed[i + 2] : 0;
            result += append3bytes(b1, b2, b3);
        }
        return result;
    }

    function renderDiagram() {
        if (format === "plantuml") {
            try {
                const encoded = encodePlantUML(scriptContent);
                const url = "https://www.plantuml.com/plantuml/svg/" + encoded;
                const img = document.createElement("img");
                img.src = url;
                img.alt = "PlantUML Diagram";
                img.onerror = () => {
                    document.getElementById("renderError").style.display = "block";
                };
                document.getElementById("plantumlOutput").appendChild(img);
            } catch (e) {
                document.getElementById("renderError").style.display = "block";
            }
        } else if (format === "nomnoml") {
            try {
                const canvas = document.getElementById("nomnomlCanvas");
                canvas.style.display = "block";
                nomnoml.draw(canvas, scriptContent);
            } catch (e) {
                document.getElementById("renderError").style.display = "block";
            }
        }
    }

    renderDiagram();
</script>

</body>
</html>
