<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RESPEQ — My Projects</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='11' fill='%231E3A8A'/><polyline points='17,13 9,24 17,35' stroke='white' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><polyline points='31,13 39,24 31,35' stroke='white' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><rect x='21' y='20' width='6' height='8' rx='2' fill='white'/></svg>"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f4f8; font-family: 'DM Sans', sans-serif; }
        .card { border: none; box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <div class="d-flex align-items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="28" height="28">
            <defs><linearGradient id="ng" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#1E3A8A"/><stop offset="100%" stop-color="#38BDF8"/></linearGradient></defs>
            <rect width="48" height="48" rx="11" fill="url(#ng)"/>
            <polyline points="17,13 9,24 17,35" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="31,13 39,24 31,35" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="21" y="20" width="6" height="8" rx="2" fill="white"/>
        </svg>
        <span style="font-family:'Syne',sans-serif;font-weight:800;letter-spacing:0.08em;font-size:1.15rem;" class="text-white">RESPEQ</span>
    </div>
    <div class="d-flex gap-3 align-items-center">
        <a href="/dashboard" class="text-white text-decoration-none">Dashboard</a>
        <a href="/profile" class="text-white text-decoration-none">Profile</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4 mb-4">
        <h5 class="fw-bold mb-3">Create New Project</h5>
        <form method="post" action="/projects" class="row g-2 align-items-end">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Name</label>
                <input type="text" name="name" class="form-control" required/>
            </div>
            <div class="col-md-5">
                <label class="form-label fw-semibold">Description</label>
                <input type="text" name="description" class="form-control"/>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100">Create Project</button>
            </div>
        </form>
    </div>

    <div class="card p-4">
        <h5 class="fw-bold mb-3">My Projects</h5>

        <p class="text-muted" th:if="${#lists.isEmpty(projects)}">You have no projects yet.</p>

        <table class="table table-hover align-middle" th:if="${not #lists.isEmpty(projects)}">
            <thead class="table-light">
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Actions</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="project : ${projects}">
                    <td class="fw-semibold" th:text="${project.name}"></td>
                    <td class="text-muted" th:text="${project.description}"></td>
                    <td>
                        <a th:href="@{/projects/{id}/usecases(id=${project.id})}"
                           class="btn btn-sm btn-outline-primary me-1">Use Cases</a>
                        <a th:href="@{/projects/{id}/crccards(id=${project.id})}"
                           class="btn btn-sm btn-outline-secondary me-1">CRC Cards</a>
                        <a th:href="@{/projects/{id}/diagrams(id=${project.id})}"
                           class="btn btn-sm btn-outline-success">Diagrams</a>
                    </td>
                    <td>
                        <form method="post"
                              th:action="@{/projects/{id}/delete(id=${project.id})}">
                            <input type="hidden" th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
