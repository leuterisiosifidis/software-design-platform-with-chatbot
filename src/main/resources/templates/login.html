<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RESPEQ — Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='11' fill='%231E3A8A'/><polyline points='17,13 9,24 17,35' stroke='white' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><polyline points='31,13 39,24 31,35' stroke='white' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><rect x='21' y='20' width='6' height='8' rx='2' fill='white'/></svg>"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f4f8; font-family: 'DM Sans', sans-serif; }
        .card { border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .brand-name { font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: 0.05em; color: #1E3A8A; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card p-5" style="width: 400px;">
        <div class="text-center mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" class="mb-2">
                <defs>
                    <linearGradient id="rqGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#1E3A8A"/>
                        <stop offset="100%" stop-color="#38BDF8"/>
                    </linearGradient>
                </defs>
                <rect width="48" height="48" rx="11" fill="url(#rqGrad)"/>
                <polyline points="17,13 9,24 17,35" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="31,13 39,24 31,35" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="21" y="20" width="6" height="8" rx="2" fill="white"/>
            </svg>
            <h2 class="brand-name mb-0">RESPEQ</h2>
            <p class="text-muted small mb-0">Requirements Specification Tool</p>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-success py-2">You have been logged out.</div>

        <form method="post" action="/login" onsubmit="localStorage.setItem('showSplash','1')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" required autofocus/>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">Login</button>
        </form>

        <p class="text-center mt-3 mb-0 text-muted small">
            Don't have an account? <a href="/register" class="text-decoration-none">Register</a>
        </p>
    </div>
</body>
</html>
