<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RESPEQ — Generate Diagrams</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><rect width='48' height='48' rx='11' fill='%231E3A8A'/><polyline points='17,13 9,24 17,35' stroke='white' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><polyline points='31,13 39,24 31,35' stroke='white' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/><rect x='21' y='20' width='6' height='8' rx='2' fill='white'/></svg>"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background: #f0f4f8; font-family: 'DM Sans', sans-serif; }
        .card { border: none; box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
        .diagram-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.12); transition: box-shadow 0.2s; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <div class="d-flex align-items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="28" height="28">
            <defs><linearGradient id="ng" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#1E3A8A"/><stop offset="100%" stop-color="#38BDF8"/></linearGradient></defs>
            <rect width="48" height="48" rx="11" fill="url(#ng)"/>
            <polyline points="17,13 9,24 17,35" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="31,13 39,24 31,35" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="21" y="20" width="6" height="8" rx="2" fill="white"/>
        </svg>
        <span style="font-family:'Syne',sans-serif;font-weight:800;letter-spacing:0.08em;font-size:1.15rem;" class="text-white">RESPEQ</span>
    </div>
    <div class="d-flex gap-3 align-items-center">
        <a href="/projects" class="text-white text-decoration-none">My Projects</a>
        <a href="/dashboard" class="text-white text-decoration-none">Dashboard</a>
    </div>
</nav>

<div class="container mt-5">
    <h4 class="fw-bold mb-4">Generate Diagrams</h4>

    <div class="row g-4">

        <!-- Use Case Diagram -->
        <div class="col-md-6">
            <div class="card p-4 diagram-card h-100">
                <h5 class="fw-bold mb-1">Use Case Diagram</h5>
                <p class="text-muted small mb-4">
                    Visualize actors and their interactions with the system use cases.
                </p>
                <form method="get"
                      th:action="@{/projects/{id}/diagrams/usecase(id=${projectId})}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Format</label>
                        <select name="format" class="form-select">
                            <option value="plantuml">PlantUML</option>
                            <option value="nomnoml">Nomnoml</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Generate</button>
                </form>
            </div>
        </div>

        <!-- Class Diagram -->
        <div class="col-md-6">
            <div class="card p-4 diagram-card h-100">
                <h5 class="fw-bold mb-1">Class Diagram</h5>
                <p class="text-muted small mb-4">
                    Visualize classes, responsibilities, and collaborations from CRC cards.
                </p>
                <form method="get"
                      th:action="@{/projects/{id}/diagrams/class(id=${projectId})}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Format</label>
                        <select name="format" class="form-select">
                            <option value="plantuml">PlantUML</option>
                            <option value="nomnoml">Nomnoml</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Generate</button>
                </form>
            </div>
        </div>

    </div>

    <div class="mt-4">
        <a th:href="@{/projects}" class="text-decoration-none text-muted">Back to Projects</a>
    </div>
</div>

</body>
</html>
