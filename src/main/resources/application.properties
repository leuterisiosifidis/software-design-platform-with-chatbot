server.port=${SERVER_PORT:8081}
spring.application.name=project

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/myy803db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

groq.api-key=${GROQ_API_KEY}
groq.api-url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:openai/gpt-oss-120b}